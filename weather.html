<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Decorative Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <div class="search">
      <input type="text" id="cityInput" placeholder="Enter city name">
      <button    class="btn" >Search</button>
    </div>

    <div class="weather">
     
      <h1 id="temp"></h1>
      <h2 id="city"></h2>
      <p id="condition"></p>
       <img id="weatherIcon" src="https://cdn-icons-png.flaticon.com/512/1779/1779940.png" alt="">
     
    </div>
  </div>

<script src="weather.js"></script>
</body>
</html>
